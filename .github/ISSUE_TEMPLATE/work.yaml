name: 🧩 Work
description: 기능 추가, 리팩터링, 인프라, 문서 등 작업 이슈
title: "제목"
labels: ["work"]

body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 내용 (필수)
      description: 무엇을 변경/추가하는지와 핵심 내용을 간단히 작성해주세요.
      placeholder: |
        (예시)
        회원 탈퇴 API를 구현합니다.
        - 로그인된 사용자가 탈퇴 요청 시 계정을 삭제합니다.
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 / 문제점 (선택)
      description: 현재 상태와 이 작업이 필요한 이유를 간단히 작성해주세요.
      placeholder: |
        (예시)
        - 탈퇴 로직의 부재로 새로운 계정 생성에 제약이 있어 테스트가 어렵습니다.
        - 사용자가 탈퇴할 수 있는 기능이 필요합니다.
    validations:
      required: false

  - type: textarea
    id: goal
    attributes:
      label: 목표 / 기대 결과 (선택)
      description: 이 작업이 완료되면 무엇이 달라지나요?
      placeholder: |
        (예시)
        - 로그인된 사용자가 탈퇴 요청 시 계정이 삭제됩니다.
        - 탈퇴 후 동일 이메일로 재가입이 가능합니다.
    validations:
      required: false

  - type: checkboxes
    id: impact
    attributes:
      label: 영향 범위 (해당 시 체크)
      description: 해당 작업이 시스템에 미치는 영향이 있다면 체크해주세요.
      options:
        - label: DB 스키마 변경
        - label: API 스펙 변경
        - label: 환경 변수 추가/변경
        - label: 동시성 / 트랜잭션 처리 영향
